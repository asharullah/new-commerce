name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Test Backend
      run: |
        cd server
        npm install
        npm test --passWithNoTests || true

    - name: Test Frontend
      run: |
        cd client
        npm install
        CI=true npm test --passWithNoTests --watchAll=false || true

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Backend
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/e-commerce-backend:${{ github.sha }} ./server
        docker tag ${{ secrets.DOCKER_USERNAME }}/e-commerce-backend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/e-commerce-backend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/e-commerce-backend:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/e-commerce-backend:latest

    - name: Build & Push Frontend
      run: |
        docker build \
          --build-arg REACT_APP_API_URL=/ \
          -t ${{ secrets.DOCKER_USERNAME }}/e-commerce-frontend:${{ github.sha }} ./client
        docker tag ${{ secrets.DOCKER_USERNAME }}/e-commerce-frontend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/e-commerce-frontend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/e-commerce-frontend:${{ github.sha }}
        docker push ${{ secrets.DOCKER_USERNAME }}/e-commerce-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        command_timeout: 20m
        script: |
          cd new-commerce

          cat > database/.env << EOF
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          EOF

          cat > server/.env << EOF
          USE_LOCALHOST=${{ secrets.USE_LOCALHOST }}
          PORT=${{ secrets.PORT }}
          DB_SERVER_USER=${{ secrets.DB_SERVER_USER }}
          DB_SERVER_HOST=${{ secrets.DB_SERVER_HOST }}
          DB_SERVER_PASSWORD=${{ secrets.DB_SERVER_PASSWORD }}
          DB_SERVER_DATABASE=${{ secrets.DB_SERVER_DATABASE }}
          JWT_SECRET_KEY_ACCESS_TOKEN=${{ secrets.JWT_SECRET_KEY_ACCESS_TOKEN }}
          JWT_SECRET_KEY_REFRESH_TOKEN=${{ secrets.JWT_SECRET_KEY_REFRESH_TOKEN }}
          EOF

          docker compose pull
          docker compose down --remove-orphans
          docker compose up -d
          docker image prune -af

          echo "Waiting for containers..."
          for i in $(seq 1 18); do
            RUNNING=$(docker compose ps --status running --quiet | wc -l)
            echo "Attempt $i/18 - running containers: $RUNNING/3"
            [ "$RUNNING" -ge 3 ] && echo "All containers up!" && break
            sleep 5
          done

          docker compose ps

          RUNNING=$(docker compose ps --status running --quiet | wc -l)
          if [ "$RUNNING" -lt 3 ]; then
            echo "ERROR: Not all containers are running!"
            exit 1
          fi
