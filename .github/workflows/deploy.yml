name: Production CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────
  # JOB 1: Test
  # ─────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: |
          server/package-lock.json
          client/package-lock.json

    - name: Test Backend
      run: |
        cd server
        npm ci
        npm test --passWithNoTests || true

    - name: Test Frontend
      run: |
        cd client
        npm ci
        CI=true npm test --passWithNoTests --watchAll=false || true

  # ─────────────────────────────
  # JOB 2: Build & Push
  # ─────────────────────────────
  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Backend
      uses: docker/build-push-action@v5
      with:
        context: ./server
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/e-commerce-backend:${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/e-commerce-backend:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/e-commerce-backend:cache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/e-commerce-backend:cache,mode=max

    - name: Build & Push Frontend
      uses: docker/build-push-action@v5
      with:
        context: ./client
        push: true
        build-args: |
          REACT_APP_API_URL=/
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/e-commerce-frontend:${{ github.sha }}
          ${{ secrets.DOCKER_USERNAME }}/e-commerce-frontend:latest
        cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/e-commerce-frontend:cache
        cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/e-commerce-frontend:cache,mode=max

  # ─────────────────────────────
  # JOB 3: Security Scan
  # ─────────────────────────────
  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Scan Backend Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ secrets.DOCKER_USERNAME }}/e-commerce-backend:${{ github.sha }}
        format: table
        exit-code: 1
        severity: CRITICAL

    - name: Scan Frontend Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ secrets.DOCKER_USERNAME }}/e-commerce-frontend:${{ github.sha }}
        format: table
        exit-code: 1
        severity: CRITICAL

  # ─────────────────────────────
  # JOB 4: Deploy
  # ─────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: security
    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        command_timeout: 20m
        script: |
          cd new-commerce

          # Save current tag for rollback
          echo "IMAGE_TAG=${{ github.sha }}" > .deploy.env

          # Create env files
          cat > database/.env << EOF
          MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}
          MYSQL_USER=${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
          EOF

          cat > server/.env << EOF
          USE_LOCALHOST=${{ secrets.USE_LOCALHOST }}
          PORT=${{ secrets.PORT }}
          DB_SERVER_USER=${{ secrets.DB_SERVER_USER }}
          DB_SERVER_HOST=${{ secrets.DB_SERVER_HOST }}
          DB_SERVER_PASSWORD=${{ secrets.DB_SERVER_PASSWORD }}
          DB_SERVER_DATABASE=${{ secrets.DB_SERVER_DATABASE }}
          JWT_SECRET_KEY_ACCESS_TOKEN=${{ secrets.JWT_SECRET_KEY_ACCESS_TOKEN }}
          JWT_SECRET_KEY_REFRESH_TOKEN=${{ secrets.JWT_SECRET_KEY_REFRESH_TOKEN }}
          EOF

          # Deploy without downtime
          export IMAGE_TAG=${{ github.sha }}
          export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
          docker compose pull
          docker compose up -d --remove-orphans
          docker image prune -af

          # Health check
          echo "Waiting for containers..."
          for i in $(seq 1 18); do
            RUNNING=$(docker compose ps --status running --quiet | wc -l)
            echo "Attempt $i/18 - running containers: $RUNNING/3"
            [ "$RUNNING" -ge 3 ] && echo "All containers up!" && break
            sleep 5
          done

          docker compose ps

          # Rollback if failed
          RUNNING=$(docker compose ps --status running --quiet | wc -l)
          if [ "$RUNNING" -lt 3 ]; then
            echo "Deploy failed! Rolling back..."
            PREV_TAG=$(cat .deploy.env.bak 2>/dev/null | grep IMAGE_TAG | cut -d= -f2)
            if [ ! -z "$PREV_TAG" ]; then
              export IMAGE_TAG=$PREV_TAG
              docker compose up -d --remove-orphans
              echo "Rolled back to $PREV_TAG"
            fi
            exit 1
          fi

          # Save current as backup for next rollback
          cp .deploy.env .deploy.env.bak
          echo "Deploy successful!"
